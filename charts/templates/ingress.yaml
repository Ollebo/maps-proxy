kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
   name: "public-maps-ollebo-com"
   namespace: ollebo
   annotations:
      kubernetes.io/ingress.class: "traefik"
      cert-manager.io/cluster-issuer: "http"
      kubernetes.io/tls-acme: "true"
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.middlewares: "ollebo-terracotta-cors@kubernetescrd,ollebo-terracotta-cache@kubernetescrd"
spec:
  tls:
  - hosts:
    - maps.ollebo.com
    secretName: maps-ollebo-tls
  rules:
    - host: maps.ollebo.com
      http:
        paths:
        - backend:
            service:
              name: terracotta
              port:
                number: 5000
          path: /rgb
          pathType: Prefix
        - backend:
            service:
              name: terracotta
              port:
                number: 5000
          path: /singleband
          pathType: Prefix
        - backend:
            service:
              name: terracotta
              port:
                number: 5000
          path: /metadata
          pathType: Prefix
        - backend:
            service:
              name: terracotta
              port:
                number: 5000
          path: /keys
          pathType: Prefix
        - backend:
            service:
              name: terracotta
              port:
                number: 5000
          path: /colormap
          pathType: Prefix
        - backend:
            service:
              name: terracotta
              port:
                number: 5000
          path: /datasets
          pathType: Prefix
        - backend:
            service:
              name: terracotta
              port:
                number: 5000
          path: /compute
          pathType: Prefix
---
# maps-proxy catch-all is a SEPARATE ingress WITHOUT the terracotta-cors
# middleware: that middleware sets Access-Control-Allow-Origin: *, which both
# duplicates and invalidates the credentialed CORS maps-proxy sends for private
# maps/models (a "*" origin is illegal with credentials). maps-proxy does its
# own CORS (echoes the ollebo.com origin + allow-credentials), so this route
# must carry no CORS middleware. Reuses the cert issued by the ingress above.
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
   name: "maps-proxy-ollebo-com"
   namespace: ollebo
   annotations:
      kubernetes.io/ingress.class: "traefik"
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
  - hosts:
    - maps.ollebo.com
    secretName: maps-ollebo-tls
  rules:
    - host: maps.ollebo.com
      http:
        paths:
        - backend:
            service:
              name: {{ .Values.name }}
              port:
                number: 8080
          path: /
          pathType: Prefix
---
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
   name: "private-maps-ollebo-com"
   namespace: ollebo
   annotations:
      kubernetes.io/ingress.class: "traefik"
      cert-manager.io/cluster-issuer: "http"
      kubernetes.io/tls-acme: "true"
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
  - hosts:
    - maps-private.ollebo.com
    secretName: maps-private-ollebo-tls
  rules:
    - host: maps-private.ollebo.com
      http:
        paths:
        - backend:
            service:
              name: {{ .Values.name }}
              port:
                number: 8080
          path: /
          pathType: Prefix
